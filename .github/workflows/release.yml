name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MotionPhotoWorkbench.sln

      - name: Publish Windows build
        run: dotnet publish MotionPhotoWorkbench.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o publish/win-x64

      - name: Add release files
        shell: pwsh
        run: |
          Copy-Item README.md publish/win-x64/README.md
          Copy-Item LICENSE.txt publish/win-x64/LICENSE.txt
          Copy-Item THIRD_PARTY_NOTICES.md publish/win-x64/THIRD_PARTY_NOTICES.md

      - name: Create ZIP
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "MotionPhotoWorkbench-$tag-win-x64.zip"
          Compress-Archive -Path publish/win-x64/* -DestinationPath $zipName
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path "$zipName.sha256" -Value "$hash  $zipName"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            MotionPhotoWorkbench-*.zip
            MotionPhotoWorkbench-*.zip.sha256

